<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库迪咖啡 · 协作计算器</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e0e0e0;
        padding: 20px;
    }
    .card {
        background: #1a2a4a;
        border: 1px solid #2a4a6a;
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
        text-align: center;
        margin-bottom: 32px;
    }
    .logo h1 {
        font-size: 28px;
        color: #d4a06a;
        letter-spacing: 2px;
    }
    .logo p {
        color: #888;
        font-size: 14px;
        margin-top: 8px;
    }
    .section { margin-bottom: 28px; }
    .section-title {
        font-size: 15px;
        font-weight: 600;
        color: #a0b0c0;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a4a6a;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
        display: block;
        font-size: 13px;
        color: #8899aa;
        margin-bottom: 6px;
    }
    input {
        width: 100%;
        padding: 12px 16px;
        background: #0d1b3a;
        border: 1px solid #2a4a6a;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        transition: border-color 0.2s;
    }
    input:focus {
        outline: none;
        border-color: #d4a06a;
    }
    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
        background: linear-gradient(135deg, #8B4513, #A0522D);
        color: #fff;
    }
    .btn-secondary {
        background: #2a4a6a;
        color: #d4a06a;
    }
    .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: #555;
        font-size: 13px;
    }
    .divider::before, .divider::after {
        content: '';
        flex: 1;
        border-top: 1px solid #2a4a6a;
    }
    .error {
        background: rgba(244,67,54,0.1);
        border: 1px solid rgba(244,67,54,0.3);
        border-radius: 8px;
        padding: 12px 16px;
        color: #f44336;
        font-size: 14px;
        margin-bottom: 16px;
    }
    .hint {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #555;
    }
    .steps {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        margin: 20px 0;
    }
    .step {
        text-align: center;
        padding: 12px;
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
    }
    .step .num {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #8B4513;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
    }
    .step .desc {
        font-size: 12px;
        color: #8899aa;
        line-height: 1.4;
    }
</style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>☕ 库迪咖啡财务计算器</h1>
        <p>在线协作版 · 多人分填，自动汇总</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="steps">
        <div class="step">
            <div class="num">1</div>
            <div class="desc">你创建项目<br>填写你掌握的信息</div>
        </div>
        <div class="step">
            <div class="num">2</div>
            <div class="desc">分享6位码<br>给对方填另一部分</div>
        </div>
        <div class="step">
            <div class="num">3</div>
            <div class="desc">各自保存<br>实时查看完整结果</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📝 创建新项目</div>
        <form method="POST" action="/create">
            <div class="form-group">
                <label>项目名称（可选）</label>
                <input type="text" name="name" placeholder="例如：呼和浩特万达店" maxlength="50">
            </div>
            <button type="submit" class="btn btn-primary">🚀 创建项目，开始填写</button>
        </form>
    </div>

    <div class="divider">或</div>

    <div class="section">
        <div class="section-title">🔗 加入已有项目</div>
        <form method="POST" action="/join">
            <div class="form-group">
                <label>输入分享码</label>
                <input type="text" name="code" placeholder="例如：XM3K9P" maxlength="10" style="text-transform:uppercase;letter-spacing:4px;font-weight:600;">
            </div>
            <button type="submit" class="btn btn-secondary">🔑 加入项目</button>
        </form>
    </div>

    <div class="hint">
        数据仅保存您填写的数字，不会收集任何个人信息
    </div>
</div>
</body>
</html>
